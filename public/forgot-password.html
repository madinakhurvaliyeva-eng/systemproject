<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - Madinaga</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <main class="single-card-wrap">
    <section class="panel narrow">
      <p class="eyebrow">Password Recovery</p>
      <h1>Reset your account password</h1>
      <p class="hero-copy small">
        Request a reset token, then set a new password using the generated token.
      </p>

      <div id="alert" class="alert"></div>

      <form id="requestForm" class="form" novalidate>
        <label>
          <span>Email</span>
          <input type="email" id="email" placeholder="you@example.com" />
        </label>
        <button type="submit" class="btn" id="requestBtn">Send reset token</button>
      </form>

      <form id="resetForm" class="form hidden" novalidate>
        <label>
          <span>Reset token</span>
          <input type="text" id="token" placeholder="Paste the token from server log" />
        </label>
        <label>
          <span>New password</span>
          <input type="password" id="newPassword" placeholder="At least 6 characters" />
        </label>
        <button type="submit" class="btn" id="resetBtn">Update password</button>
      </form>

      <a class="inline-link top-gap" href="/index.html">Back to login</a>
    </section>
  </main>

  <script src="/js/forgot-password.js"></script>
</body>
</html>
